<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Book – Register</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <span class="brand-icon">📋</span>
        <h1>Contact Book</h1>
      </div>
      <h2>Register</h2>

      <div id="error-msg" class="alert alert-error hidden"></div>
      <div id="success-msg" class="alert alert-success hidden"></div>

      <div class="form-group">
        <input type="text" id="username" placeholder="Username" autocomplete="username" />
      </div>
      <div class="form-group">
        <input type="email" id="email" placeholder="Email" autocomplete="email" />
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" autocomplete="new-password" />
      </div>
      <button id="register-btn" class="btn-primary">Register</button>
      <p class="auth-link">Already have an account? <a href="Index.html">Login here</a></p>
    </div>
  </div>
  <script src="signup.js"></script>
</body>
</html>
