<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Book – Login</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <main class="auth-container">
    <section class="auth-card" aria-labelledby="login-heading">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">📋</span>
        <h1 class="brand-title">Contact Book</h1>
      </div>

      <h2 id="login-heading">Login</h2>

      <div id="error-msg" class="alert alert-error hidden" role="alert"></div>
      <div id="success-msg" class="alert alert-success hidden" role="status"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="visually-hidden">Email</label>
          <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password" class="visually-hidden">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="current-password" required minlength="6" />
        </div>
        <button id="login-btn" class="btn-primary" type="submit">Login</button>
      </form>

      <p class="auth-link">Don't have an account? <a href="signup.html">Register here</a></p>
    </section>
  </main>

  <script src="Script.js"></script>
</body>
</html>
