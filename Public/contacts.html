<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Book – Contacts</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="brand-icon">📋</span>
      <span>Contact Book</span>
    </div>
    <div class="nav-user">
      <span id="nav-username">Loading...</span>
      <button id="logout-btn" class="btn-logout">Logout</button>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-container">
    <div class="page-header">
      <h2>My Contacts</h2>
      <button id="add-contact-btn" class="btn-primary">+ Add Contact</button>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="🔍 Search by name, email or phone..." />
    </div>

    <!-- Alerts -->
    <div id="error-msg" class="alert alert-error hidden"></div>
    <div id="success-msg" class="alert alert-success hidden"></div>

    <!-- Contacts Grid -->
    <div id="contacts-grid" class="contacts-grid">
      <p class="empty-state">Loading contacts...</p>
    </div>
  </div>

  <!-- Modal: Add / Edit Contact -->
  <div id="contact-modal" class="modal hidden">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Add Contact</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div id="modal-error" class="alert alert-error hidden"></div>
        <input type="hidden" id="contact-id" />
        <div class="form-group">
          <label>Name <span class="required">*</span></label>
          <input type="text" id="contact-name" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="contact-email" placeholder="Email address" />
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="contact-phone" placeholder="Phone number" />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="contact-address" placeholder="Address" />
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="contact-notes" placeholder="Additional notes..." rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button id="cancel-btn" class="btn-secondary">Cancel</button>
          <button id="save-contact-btn" class="btn-primary">Save Contact</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: Confirm Delete -->
  <div id="delete-modal" class="modal hidden">
    <div class="modal-overlay" id="delete-overlay"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h3>Delete Contact</h3>
        <button class="modal-close" id="delete-modal-close">✕</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete <strong id="delete-contact-name"></strong>? This cannot be undone.</p>
        <div class="modal-actions">
          <button id="cancel-delete-btn" class="btn-secondary">Cancel</button>
          <button id="confirm-delete-btn" class="btn-danger">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="contacts.js"></script>
</body>
</html>
